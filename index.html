<style>
html,body{

.big{

}

.tiny{

}

.soft{
opacity:0.8;
}

body.alt-select .item{
user-select:text;

}

.item:hover{

}

.side-label{

.tip{

}

.tip span{

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<script>
const { Engine, World, Bodies, Runner, Body, Mouse, MouseConstraint } = Matter;

const engine = Engine.create();
const world = engine.world;
world.gravity.y = 1;

const items = document.querySelectorAll('.item');
const centerTitleEl = document.getElementById('centerTitle');
const centerSubEl = document.querySelector('.center-sub');
const heartRunnerEl = document.getElementById('heartRunner');
const svgMaskLayerEl = document.getElementById('svgMaskLayer');
const svgMaskedTextsEl = document.getElementById('svgMaskedTexts');
const circleClipShapeEl = document.getElementById('circleClipShape');
const bodies = [];
const staticSvgEntries = [];

let floor = null;
let leftWall = null;
let rightWall = null;
let ceiling = null;
let mouseConstraint = null;
let centerBlock = null;
let cakeBlock1 = null;
let cakeBlock2 = null;
let cakeBlock3 = null;
let started = false;

const heartRunner = {
  x: window.innerWidth * 0.3,
  y: window.innerHeight * 0.4,
  vx: 1.35,
  vy: -1.1,
  size: 26
};

function createBounds() {
  if (floor) {
    const toRemove = [floor, leftWall, rightWall, ceiling];
    if (centerBlock) toRemove.push(centerBlock);
    if (cakeBlock1) toRemove.push(cakeBlock1);
    if (cakeBlock2) toRemove.push(cakeBlock2);
    if (cakeBlock3) toRemove.push(cakeBlock3);
    World.remove(world, toRemove);
  }

  floor = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 40, window.innerWidth, 80, { isStatic: true });
  leftWall = Bodies.rectangle(-40, window.innerHeight / 2, 80, window.innerHeight, { isStatic: true });
  rightWall = Bodies.rectangle(window.innerWidth + 40, window.innerHeight / 2, 80, window.innerHeight, { isStatic: true });
  ceiling = Bodies.rectangle(window.innerWidth / 2, -40, window.innerWidth, 80, { isStatic: true });

  const titleRect = centerTitleEl.getBoundingClientRect();
  centerBlock = Bodies.rectangle(
    titleRect.left + titleRect.width / 2,
    titleRect.top + titleRect.height / 2,
    titleRect.width + 18,
    titleRect.height + 10,
    {
      isStatic: true,
      restitution: 0.9,
      friction: 0,
      render: { visible: false }
    }
  );

  const tier1 = document.querySelector('.tier-1').getBoundingClientRect();
  const tier2 = document.querySelector('.tier-2').getBoundingClientRect();
  const tier3 = document.querySelector('.tier-3').getBoundingClientRect();

  cakeBlock1 = Bodies.rectangle(
    tier1.left + tier1.width / 2,
    tier1.top + tier1.height / 2,
    tier1.width,
    tier1.height,
    { isStatic: true, restitution: 0.6 }
  );

  cakeBlock2 = Bodies.rectangle(
    tier2.left + tier2.width / 2,
    tier2.top + tier2.height / 2,
    tier2.width,
    tier2.height,
    { isStatic: true, restitution: 0.6 }
  );

  cakeBlock3 = Bodies.rectangle(
    tier3.left + tier3.width / 2,
    tier3.top + tier3.height / 2,
    tier3.width,
    tier3.height,
    { isStatic: true, restitution: 0.6 }
  );

  World.add(world, [floor, leftWall, rightWall, ceiling, centerBlock, cakeBlock1, cakeBlock2, cakeBlock3]);
}

function createSvgTextForElement(el) {
  if (!svgMaskedTextsEl) return null;
  const svgNS = 'http://www.w3.org/2000/svg';
  const textEl = document.createElementNS(svgNS, 'text');
  textEl.textContent = el.innerText.trim();
  if (el.classList.contains('big')) textEl.setAttribute('class', 'svg-big');
  else if (el.classList.contains('tiny')) textEl.setAttribute('class', 'svg-tiny');
  else textEl.setAttribute('class', 'svg-word');
  svgMaskedTextsEl.appendChild(textEl);
  return textEl;
}

function createStaticSvgText(sourceEl, className) {
  if (!svgMaskedTextsEl || !sourceEl) return;
  const svgNS = 'http://www.w3.org/2000/svg';
  const textEl = document.createElementNS(svgNS, 'text');
  textEl.textContent = sourceEl.textContent.trim();
  textEl.setAttribute('class', className);
  svgMaskedTextsEl.appendChild(textEl);
  staticSvgEntries.push({ source: sourceEl, textEl });
}

createBounds();
createStaticSvgText(centerTitleEl, 'svg-center-title');
createStaticSvgText(centerSubEl, 'svg-center-sub');

items.forEach((el) => {
  const rect = el.getBoundingClientRect();
  const initialAngle = parseFloat(el.dataset.angle || '0');
  const body = Bodies.rectangle(
    rect.left + rect.width / 2,
    rect.top + rect.height / 2,
    rect.width,
    rect.height,
    {
      restitution: 0.72,
      friction: 0.12,
      frictionAir: 0.018,
      density: 0.0015,
      angle: initialAngle
    }
  );

  const svgText = createSvgTextForElement(el);
  bodies.push({ el, body, w: rect.width, h: rect.height, initialAngle, svgText });
  World.add(world, body);
});

const runner = Runner.create();

const mouse = Mouse.create(document.body);
mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: {
    stiffness: 0.18,
    damping: 0.08,
    render: { visible: false }
  }
});
World.add(world, mouseConstraint);

window.addEventListener('keydown', (e) => {
  if (e.key === 'Alt') {
    document.body.classList.add('alt-select');
    mouseConstraint.enabled = false;
  }
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'Alt') {
    document.body.classList.remove('alt-select');
    mouseConstraint.enabled = true;
  }
});

async function copySelectedText() {
  const text = window.getSelection().toString().trim();
  if (!text) return;

  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
  }
}

window.addEventListener('keydown', (e) => {
  const isCopyShortcut = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c';
  if (!isCopyShortcut) return;
  if (!document.body.classList.contains('alt-select')) return;
  if (!window.getSelection().toString().trim()) return;

  e.preventDefault();
  copySelectedText();
});

let dragStart = null;
let lastDragSample = null;
let draggedBody = null;

Matter.Events.on(mouseConstraint, 'startdrag', (event) => {
  draggedBody = event.body;
  dragStart = {
    x: mouse.position.x,
    y: mouse.position.y,
    t: performance.now()
  };
  lastDragSample = { ...dragStart };
});

window.addEventListener('mousemove', () => {
  if (!draggedBody) return;
  lastDragSample = {
    x: mouse.position.x,
    y: mouse.position.y,
    t: performance.now()
  };
});

window.addEventListener('touchmove', () => {
  if (!draggedBody) return;
  lastDragSample = {
    x: mouse.position.x,
    y: mouse.position.y,
    t: performance.now()
  };
}, { passive: true });

Matter.Events.on(mouseConstraint, 'enddrag', () => {
  if (!draggedBody || !dragStart || !lastDragSample) {
    draggedBody = null;
    dragStart = null;
    lastDragSample = null;
    return;
  }

  const dt = Math.max((lastDragSample.t - dragStart.t) / 1000, 0.016);
  const vx = (lastDragSample.x - dragStart.x) / dt;
  const vy = (lastDragSample.y - dragStart.y) / dt;

  const clampedVX = Math.max(Math.min(vx * 0.0012, 1.25), -1.25);
  const clampedVY = Math.max(Math.min(vy * 0.0012, 1.25), -1.25);
  const spin = Math.max(Math.min(clampedVX * 0.05, 0.12), -0.12);

  Body.setVelocity(draggedBody, { x: clampedVX, y: clampedVY });
  Body.setAngularVelocity(draggedBody, spin);

  draggedBody = null;
  dragStart = null;
  lastDragSample = null;
});

function render() {
  const circleEl = document.querySelector('.circle');
  const circleRect = circleEl ? circleEl.getBoundingClientRect() : null;

  if (svgMaskLayerEl) {
    svgMaskLayerEl.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
  }

  if (circleRect && circleClipShapeEl) {
    circleClipShapeEl.setAttribute('cx', circleRect.left + circleRect.width / 2);
    circleClipShapeEl.setAttribute('cy', circleRect.top + circleRect.height / 2);
    circleClipShapeEl.setAttribute('r', circleRect.width / 2);
  }

  bodies.forEach(({ el, body, w, h, initialAngle, svgText }) => {
    if (started) {
      el.style.left = (body.position.x - w / 2) + 'px';
      el.style.top = (body.position.y - h / 2) + 'px';
      el.style.transform = `rotate(${body.angle}rad)`;
    } else {
      el.style.transform = `rotate(${initialAngle}rad)`;
    }

    if (svgText) {
      const rect = el.getBoundingClientRect();
      const angleDeg = ((started ? body.angle : initialAngle) * 180) / Math.PI;
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      svgText.setAttribute('x', cx);
      svgText.setAttribute('y', cy);
      svgText.setAttribute('transform', `rotate(${angleDeg} ${cx} ${cy})`);
    }
  });

  staticSvgEntries.forEach(({ source, textEl }) => {
    const rect = source.getBoundingClientRect();
    textEl.setAttribute('x', rect.left + rect.width / 2);
    textEl.setAttribute('y', rect.top + rect.height / 2);
  });

  const maxX = window.innerWidth - heartRunner.size;
  const maxY = window.innerHeight - heartRunner.size;

  heartRunner.x += heartRunner.vx;
  heartRunner.y += heartRunner.vy;

  if (heartRunner.x <= 0) {
    heartRunner.x = 0;
    heartRunner.vx *= -1;
  } else if (heartRunner.x >= maxX) {
    heartRunner.x = maxX;
    heartRunner.vx *= -1;
  }

  if (heartRunner.y <= 0) {
    heartRunner.y = 0;
    heartRunner.vy *= -1;
  } else if (heartRunner.y >= maxY) {
    heartRunner.y = maxY;
    heartRunner.vy *= -1;
  }

  if (heartRunnerEl) {
    heartRunnerEl.style.left = heartRunner.x + 'px';
    heartRunnerEl.style.top = heartRunner.y + 'px';
  }

  requestAnimationFrame(render);
}

function start() {
  if (started) return;

  bodies.forEach(({ el, body, initialAngle }) => {
    const rect = el.getBoundingClientRect();
    Body.setPosition(body, {
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2
    });
    Body.setAngle(body, initialAngle);
    Body.setVelocity(body, { x: 0, y: 0 });
    Body.setAngularVelocity(body, 0);
  });

  started = true;
  Runner.run(runner, engine);

  const tipLabel = document.querySelector('.tip span');
  if (tipLabel) {
    tipLabel.textContent = 'kelimeleri sürükle !';
  }
}

setTimeout(start, 5000);
window.addEventListener('resize', () => {
  createBounds();
  heartRunner.x = Math.min(heartRunner.x, window.innerWidth - heartRunner.size);
  heartRunner.y = Math.min(heartRunner.y, window.innerHeight - heartRunner.size);
});

render();
</script>

<script>
const bgMusic = document.getElementById('bgMusic');
let musicStarted = false;

function startMusicAfterDelay(){
  if(!bgMusic || musicStarted) return;
  musicStarted = true;
  bgMusic.volume = 0.5;
  bgMusic.play().catch(()=>{});
});
  },5000);
}

window.addEventListener('pointerdown', startMusicAfterDelay, {once:true});
window.addEventListener('touchstart', startMusicAfterDelay, {once:true});
</script>
